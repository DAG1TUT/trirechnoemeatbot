<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Продавцы</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="page">
    <div class="page-gradient"></div>

    <header class="shell header">
      <div class="header-left">
        <div class="brand-mark">
          <span class="brand-dot"></span>
          <span class="brand-pulse"></span>
        </div>
        <div>
          <h1 class="header-title">Продавцы</h1>
          <p class="header-subtitle">Управление продавцами и их статусом</p>
        </div>
      </div>
      <div class="header-right">
        <a href="/" class="link-button">Обзор по выручке</a>
      </div>
    </header>

    <main class="shell main">
      <section class="panel">
        <h2 class="panel-title">Добавить продавца</h2>
        <form method="post" action="/sellers/add" class="form-row">
          <input
            type="text"
            name="full_name"
            placeholder="ФИО продавца"
            class="text-input"
            required
          />
          <button type="submit" class="primary-button">
            <span class="button-dot"></span>
            <span>Добавить</span>
          </button>
        </form>
      </section>

      <section class="panel">
        <h2 class="panel-title">Список продавцов</h2>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>ФИО</th>
                <th>Статус</th>
                <th class="table-actions">Действия</th>
              </tr>
            </thead>
            <tbody>
              {% for s in sellers %}
              <tr>
                <td>{{ s.id }}</td>
                <td>
                  <form
                    method="post"
                    action="/sellers/rename"
                    class="inline-form"
                  >
                    <input type="hidden" name="seller_id" value="{{ s.id }}" />
                    <input
                      type="text"
                      name="full_name"
                      value="{{ s.full_name }}"
                      class="text-input compact"
                    />
                    <button type="submit" class="ghost-button">
                      Сохранить
                    </button>
                  </form>
                </td>
                <td>
                  {% if s.is_active %}
                  <span class="badge badge-open">активен</span>
                  {% else %}
                  <span class="badge badge-muted">отключен</span>
                  {% endif %}
                </td>
                <td class="table-actions">
                  <form
                    method="post"
                    action="/sellers/toggle"
                    class="inline-form"
                  >
                    <input type="hidden" name="seller_id" value="{{ s.id }}" />
                    {% if s.is_active %}
                    <input type="hidden" name="is_active" value="false" />
                    <button type="submit" class="danger-button">
                      Отключить
                    </button>
                    {% else %}
                    <input type="hidden" name="is_active" value="true" />
                    <button type="submit" class="success-button">
                      Включить
                    </button>
                    {% endif %}
                  </form>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
