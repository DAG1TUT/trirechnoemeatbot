<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Кабинет продавца</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="page">
    <div class="page-gradient"></div>
    <header class="shell header">
      <div class="header-left">
        <div class="brand-mark">
          <span class="brand-dot"></span>
          <span class="brand-pulse"></span>
        </div>
        <div>
          <h1 class="header-title">Кабинет продавца</h1>
          <p class="header-subtitle">{{ seller.full_name }} · ID {{ seller.id }}</p>
        </div>
      </div>
      <div class="header-right" style="gap: 0.5rem; flex-wrap: wrap">
        <form method="post" action="/seller-cabinet/logout" style="display: inline">
          <button type="submit" class="ghost-button">Выйти</button>
        </form>
        <form method="post" action="/seller-cabinet/unbind" style="display: inline" onsubmit="return confirm('Сбросить веб-вход? Потом можно снова зарегистрироваться по списку ФИО.');">
          <button type="submit" class="danger-button">Отвязать веб-аккаунт</button>
        </form>
      </div>
    </header>
    <main class="shell main">
      <section class="panel">
        <h2 class="panel-title">Дальше</h2>
        <p class="header-subtitle" style="margin-bottom: 0.75rem">
          Здесь будет открытие смены, отчёт и закрытие — как в Telegram-боте. Сейчас доступны вход, выход и отвязка учётки.
        </p>
        <p class="header-subtitle">
          <a href="/" class="seller-link">Админ-дашборд</a>
        </p>
      </section>
    </main>
  </body>
</html>
