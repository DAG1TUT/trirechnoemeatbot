<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Вход для продавца</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="page">
    <div class="page-gradient"></div>
    <main class="shell main" style="max-width: 480px; padding-top: 3rem">
      <section class="panel">
        <h1 class="header-title" style="margin-bottom: 0.5rem">Вход для продавца</h1>
        <p class="header-subtitle" style="margin-bottom: 1.25rem">
          Укажите ваш номер в системе (ID) и пароль, заданный при регистрации.
        </p>
        {% if error %}
        <p class="seller-error">{{ error }}</p>
        {% endif %}
        <form method="post" action="/seller-cabinet/login" class="seller-form">
          <label class="field-label">ID продавца</label>
          <input
            type="number"
            name="seller_id"
            class="text-input"
            required
            min="1"
            placeholder="Например: 3"
          />
          <label class="field-label">Пароль</label>
          <input
            type="password"
            name="password"
            class="text-input"
            required
            autocomplete="current-password"
          />
          <button type="submit" class="primary-button" style="margin-top: 0.75rem">
            <span class="button-dot"></span>
            <span>Войти</span>
          </button>
        </form>
        <p style="margin-top: 1.25rem; font-size: 0.85rem; color: rgba(148, 163, 184, 0.95)">
          Нет аккаунта?
          <a href="/seller-cabinet/register" class="seller-link">Регистрация по ФИО из списка</a>
        </p>
        <p style="margin-top: 0.75rem">
          <a href="/" class="seller-link">← Админ-дашборд</a>
        </p>
      </section>
    </main>
  </body>
</html>
