<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Вход для продавца</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="page">
    <div class="page-gradient"></div>
    <main class="shell main seller-auth-main">
      <section class="panel seller-auth-panel">
        <h1 class="header-title">Вход для продавца</h1>
        <p class="header-subtitle" style="margin-top: 0.5rem; margin-bottom: 0">
          Укажите ваш номер в системе (ID) и пароль, заданный при регистрации.
        </p>
        {% if error %}
        <p class="seller-error">{{ error }}</p>
        {% endif %}
        <form method="post" action="/seller-cabinet/login" class="seller-form">
          <label class="field-label">ID продавца</label>
          <input
            type="number"
            name="seller_id"
            class="text-input"
            required
            min="1"
            placeholder="Например: 3"
          />
          <label class="field-label">Пароль</label>
          <input
            type="password"
            name="password"
            class="text-input"
            required
            autocomplete="current-password"
          />
          <button type="submit" class="primary-button">
            <span class="button-dot"></span>
            <span>Войти</span>
          </button>
        </form>
        <p class="seller-auth-footer">
          Нет аккаунта?
          <a href="/seller-cabinet/register" class="seller-link">Регистрация по ФИО из списка</a>
        </p>
        <p class="seller-auth-footer" style="margin-top: 0.5rem">
          <a href="/" class="seller-link">← К выбору входа</a>
          <span style="margin: 0 0.5rem; color: var(--text-muted)">·</span>
          <a href="/dashboard" class="seller-link">Админ-дашборд</a>
        </p>
      </section>
    </main>
  </body>
</html>
